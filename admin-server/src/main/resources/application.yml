server:
  port: 8090   

spring:
  application:
    name: admin-server

  security:
    user:
      name: admin
      password: admin123   # you can change this

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always